notes: |
  Sweep cell `p_flip_25` from sweep_20260505_211814_aug_v1_round_1.
  Vs prior best (run_20260505_154907): just p_flip 0.5 -> 0.25.
  Tested whether a lower flip rate recovers cross_court_net_shot,
  which had been ~5% below wipe_drop on prior aug runs.

  Mean 0.7402 / 0.4783 / 0.7602 / 0.9383. Vs prior best mean
  (0.7447 / 0.4778 / 0.7635 / 0.9394): macro -0.5, min ~flat,
  acc -0.3, top-2 -0.1. Inside the 5-serial seed envelope (~0.5%
  macro, ~2% min; see augmentation_framework.md "Seed-noise envelope
  on run means" section). Verdict TIE.

  Cross_court_net_shot per-class mean 0.6004 vs ref 0.6060: didn't
  recover. Per-class seed noise on cross_court alone is ~11% range
  across the prior reference's 5 serials, so the flip hypothesis
  isn't testable at this sample size — halving p_flip didn't move
  it, but the noise floor on the class is bigger than the suspected
  effect.

  Smash lifts +5.3% on the run mean (0.580 -> 0.633); push -4.1%
  and rush -2.4% take it back. Macro nets a small loss within noise.

  S3 picked: macro 0.7426 within 0.24% of run-top S1, best min in
  that close-macro band (0.4785). State.json's default S2 had top
  min (0.5097) but macro 0.7346 sat 1.0% below S1, outside the seed
  envelope.

  Full sweep round writeup: arch_1_directions.md "Aug v1 round 1
  hparam sweep" section.
