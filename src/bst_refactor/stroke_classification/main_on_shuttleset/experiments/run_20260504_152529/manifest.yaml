notes: |
  Jitter-off ablation. RandomTranslation_batch(prob=0.0) at
  bst_train.py:375; hparams otherwise identical to the wipe_drop best
  (run_20260503_172922).

  Mean 0.7401 / 0.4301 / 0.7586 / 0.9365. Vs wipe_drop mean: macro
  -0.8, min -4.4, acc -0.7, top-2 +0.1. Wrist_smash mean 0.4742 ->
  0.4301; S4/S5 min F1 floor at 0.39 / 0.36. Best S2 (top min 0.485,
  top pair-sum 1.225).

  Turns out the conceptually broken jitter was carrying real
  regularisation weight: turn it off and min F1 falls below the CDB-F1
  baseline too, not just below wipe_drop. Defaults restored.

  Full writeup: arch_1_directions.md (jitter-off ablation section).
