notes: |
  Augmentation framework v1, p_jitter bumped 0.2 -> 0.3 to test the
  under-regularisation read on the previous aug run. Everything else
  held: p_flip=0.5, cap_y=0.05, cap_x=0.10, eps=0.15. Hparams otherwise
  identical to the previous aug run (run_20260505_111211).

  Mean 0.7447 / 0.4779 / 0.7635 / 0.9394. Vs the previous aug run
  (p_jitter=0.2) mean: macro +0.6, min +0.3, acc +0.4, top-2 ~flat.
  Vs the wipe_drop best (run_20260503_172922) mean: macro -0.3,
  min +0.4, acc -0.2, top-2 +0.4. Aug now at parity-or-better than
  wipe_drop: head metrics within noise, floor and top-2 ahead.
  Under-reg hypothesis was right.

  S5 picked. Smash 0.515 / wrist_smash 0.519, smash again the floor
  class for the second project run running. Pair sum 1.033, slightly
  tighter than the previous S5's 1.021. Min F1 0.515 a project high.
  S5 also lifts the mid-tier classes vs the previous S5: drop +4.7%,
  rush +7.3%, drive +3.9%, push +3.4%, passive_drop +3.4%.

  Cross_court_net_shot still down ~5% vs wipe_drop best. The bump
  from p_jitter=0.2 to 0.3 didn't move it, so the regression isn't
  on the exposure axis. Likely flip-mediated; p_flip ablation flagged
  for follow-up.

  Full writeup: arch_1_directions.md (augmentation framework v1 section).
