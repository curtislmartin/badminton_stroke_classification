notes: |
  Augmentation framework v1. Coupled centreline flip + pos+shuttle
  constrained jitter (cap_y=0.05, cap_x=0.10, eps=0.15, p_flip=0.5,
  p_jitter=0.2). Replaces the broken joints-only RandomTranslation_batch
  with the corrected multi-stream coupled formulation. JnB_bone-only at
  present.

  Mean 0.7388 / 0.4750 / 0.7591 / 0.9402. Vs the wipe_drop best
  (run_20260503_172922) mean: macro -0.9, min flat (+0.1), acc -0.6,
  top-2 +0.5. Cross_court_net_shot dropped 5.7%, the biggest
  single-class movement; smash -3.0%, push -2.1%, passive_drop -1.3%.
  Wrist_smash up 0.4%, drive up 1.6%.

  S5 picked on the floor lift. Smash 0.503, wrist_smash 0.518: first
  serial on the project to balance these two, with smash taking over
  as the floor class for the first time (the structural inversion
  CDB-F1 was built for). Min F1 also a project high at 0.503. Macro
  middling at 0.734 and pair sum 1.021 below wipe_drop S2's 1.104,
  so the pick is on the floor not the ceiling.

  Possible issue under investigation: jitter shifts that push the
  shuttle off-screen on x get the (0, 0) sentinel, by design
  (mirroring the y off-screen zeroing the model already learns
  from on top-of-court shuttle drops). Whether the model adapts
  the same way on the x variant is open. Cross_court_net_shot
  dropped 5.7% this run, the kind of edge-of-frame class where the
  mechanism would bite hardest, but frequency unknown yet.
  Aug/shuttle_oob_rate TB scalar going in next to measure it,
  offline estimator script in scripts/ for a number before the
  next training run. If subsequent runs don't flag this further,
  it was empirically tolerable.

  Full writeup: arch_1_directions.md (augmentation framework v1 section).
