notes: |
  Shuttle-mask. Branch shuttle/mask-wiring, ablation_id=mask_wiring
  (only train-loop signal of the data + model change). Carries the
  shuttle-unzeroing change plus a variant 2a shuttle_missing
  channel fused post-TCN: mask_proj (Linear(1, 4)) + shuttle_fuse
  (Linear(d_model + 4, d_model)). Hparams otherwise identical to
  the shuttle-unzeroing run (run_20260503_172922).

  Mean 0.7440 / 0.4568 / 0.7630 / 0.9365. Vs the shuttle-unzeroing
  mean: macro -0.4, min -1.7, acc -0.2, top-2 +0.1. Mask channel
  didn't add anything on top of just unzeroing the shuttle. Smash
  flat (+0.1%), ws -1.7%, rush -2.7%, passive_drop -1.4%; clear
  bounced back +0.6%. Probably the model was already inferring
  missing-shuttle from xy + temporal context, plus the new fuse
  layer ate some learning budget for a near-identity solution on
  the original 100 dims.

  Best S4 (top min 0.490, top top-2 0.939, top ws 0.490, pair-sum
  1.085). S1 won head metrics (macro 0.749, acc 0.769) but ws
  only 0.440; S4 picked on the floor.

  Shuttle-unzeroing is the keeper. Branch tagged + dropped, design
  captured in scratch/architecture_notes/.

  Full writeup: arch_1_directions.md (shuttle-mask section).
