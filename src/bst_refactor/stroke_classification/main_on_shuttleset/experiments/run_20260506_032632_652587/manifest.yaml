notes: |
  Sweep cell `p_flip_25_x_p_jitter_30` from
  sweep_20260505_211814_aug_v1_round_1.

  Cell config: p_flip=0.25, p_jitter=0.3. The `p_jitter: 0.3`
  override matched the sweep's base value, so the effective config
  ended up identical to `p_flip_25` (the same sweep's earlier run).
  Two 5-serial runs with the same aug, different seeds — unintended
  but useful as a direct seed-noise estimate: macro spread 0.13%,
  min F1 2.14%, acc 0.14%, top-2 0.02%. See augmentation_framework.md
  "Seed-noise envelope on run means" section for the implications.

  Mean 0.7389 / 0.4569 / 0.7588 / 0.9385. Vs prior best mean
  (0.7447 / 0.4778 / 0.7635 / 0.9394): macro -0.6, min -2.1,
  acc -0.7, top-2 -0.1. Verdict LOSE — but the same-config
  replicate p_flip_25 came in at TIE, so this run's LOSE is the
  unlucky tail of a noise-sized swing rather than a real effect.

  S1 picked: top macro (0.7447, equal to the prior ref run-mean),
  top min (0.5231 wrist_smash) — single-serial joint best of the
  round on macro × min, and a new project-wide single-serial min
  F1 high (prior was the ref's S5 at 0.5147 smash floor). Best
  deployable weights of the four runs, even though it sits inside
  the worst-mean run.

  Full sweep round writeup: arch_1_directions.md "Aug v1 round 1
  hparam sweep" section.
