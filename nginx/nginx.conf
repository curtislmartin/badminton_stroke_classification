events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # Rate limiting zones.
    # Uploads are limited strictly since each one triggers a background processing job.
    # API polling is more generous to support the frontend status-check loop.
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    server {
        listen 80;

        # Must match MAX_FILE_SIZE_MB in src/api/config.py.
        # Without this nginx rejects large uploads before they reach FastAPI.
        client_max_body_size 500M;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP: self-contained React app, no CDN resources.
        # unsafe-inline for style-src covers CSS modules and inline styles from component libraries.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; media-src 'self' blob:;" always;

        # Upload endpoint gets its own stricter rate limit
        location = /api/upload {
            limit_req zone=uploads burst=3 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
